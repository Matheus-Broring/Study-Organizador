<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Study+ | Organizador de Estudos</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<header></header>
<main class="container">
  <section class="card">
    <h2>Planejamento do Dia</h2>
    <ul>
      <li>Matemática - 1h</li>
      <li>História - 40min</li>
      <li>Revisão de Inglês</li>
    </ul>
  </section>
  <section class="card">
    <h2>Matérias</h2>
    <ul>
      <li>Matemática</li>
      <li>Português</li>
      <li>História</li>
      <li>Geografia</li>
    </ul>
  </section>
  <section class="card">
    <h2>Tarefas</h2>
    <div class="taskInput">
      <input type="text" id="novaTarefa" placeholder="Nova tarefa..." />
      <button onclick="addTarefa()">Adicionar</button>
    </div>
    <ul id="listaTarefas">
      <li onclick="remover(this)">✔ Fazer exercícios de matemática</li>
      <li onclick="remover(this)">✔ Ler capítulo de história</li>
    </ul>
  </section>
  <section class="card whiteboardCard">
    <h2>Whiteboard</h2>
    <canvas id="board"></canvas>
    <div class="boardButtons">
      <button onclick="limpar()">Limpar</button>
    </div>
  </section>
</main>
<footer>Study+ © 2026</footer>
<script src="script.js"></script>
</body>
</html>
