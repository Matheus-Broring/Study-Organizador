<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Study+ | Criar conta</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
</head>
<body class="cadastro-body">
    <div class="cadastro-container">
        <div class="cadastro-card">
            <h1 class="cadastro-logo">Study<span>+</span></h1>
            <p class="cadastro-tagline">Crie sua conta e organize seus estudos</p>

            <form class="cadastro-form" id="formCadastro">
                <div class="input-group">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="••••••" required>
                </div>

                <div class="input-group">
                    <label for="confirmar">Confirmar senha</label>
                    <input type="password" id="confirmar" name="confirmar" placeholder="••••••" required>
                </div>

                <button type="submit" class="btn-cadastrar">Cadastrar →</button>
            </form>

            <p class="login-link">Já tem uma conta? <a href="index.html">Faça login</a></p>
        </div>
        <div class="cadastro-footer">
            <span>🚀 Estude com foco e organização</span>
        </div>
    </div>

    <script>
        document.getElementById('formCadastro').addEventListener('submit', function(e) {
            e.preventDefault();
            const senha = document.getElementById('senha').value;
            const confirmar = document.getElementById('confirmar').value;
            if (senha !== confirmar) {
                alert('As senhas não coincidem.');
                return;
            }
            alert('Cadastro realizado com sucesso! (demonstração)');
        });
    </script>
</body>
</html>
